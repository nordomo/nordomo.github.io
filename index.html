<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunga Mutlu</title>

  <!-- Link to your main styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Inline styles for animation and background -->
  <style>
    /* Animation for h1 */
    @keyframes neon {
      0%, 100% {
        text-shadow: 0 0 5px #ff0099, 0 0 10px #ff0099, 0 0 20px #ff0099;
      }
      50% {
        text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 50px #ff00ff;
      }
    }

    /* Set the image as a full-page background */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100%;
      background: url('rotterdam-skyline-pixel.png') no-repeat center center fixed;
      background-size: cover; /* Ensures the image covers the entire screen */
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Header styling */
    header {
      text-align: center;
      padding-top: 20vh; /* Pushes the content down a bit */
    }

    h1 {
      animation: neon 1.5s infinite alternate;
      font-size: 3em;
      margin: 0;
    }

    p {
      font-size: 1.2em;
      text-shadow: 1px 1px 5px black;
    }

    /* Navigation styling */
    nav {
      text-align: center;
      margin-top: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 1.2em;
      text-shadow: 1px 1px 5px black;
    }

    nav a:hover {
      text-shadow: 0 0 10px #ff0099;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tunga Mutlu</h1>
    <p>Your tagline here (e.g., Data Science Master's Student)</p>
  </header>
  
  <nav>
    <a href="#about">About Me</a>
    <a href="#experience">Experience</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</body>
</html>
