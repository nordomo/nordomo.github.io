<section id="experience">
  <h2>Experience</h2>
  <p>Click on the logos below to learn more about my professional experiences.</p>
  
  <!-- Experience Grid -->
  <div class="experience-grid">
    <!-- Adidas -->
    <div class="experience-item" onclick="showExperience('adidas')">
      <img src="adidas-logo.png" alt="Adidas Logo">
    </div>
    <!-- Jacobs Douwe Egberts -->
    <div class="experience-item" onclick="showExperience('jde')">
      <img src="jde-logo.png" alt="JDE Logo">
    </div>
    <!-- Activision Blizzard -->
    <div class="experience-item" onclick="showExperience('activision')">
      <img src="activision-logo.png" alt="Activision Blizzard Logo">
    </div>
    <!-- Alternatif Bank -->
    <div class="experience-item" onclick="showExperience('alternatifbank')">
      <img src="alternatifbank-logo.png" alt="Alternatif Bank Logo">
    </div>
  </div>

  <!-- Experience Details -->
  <div id="experience-details" class="hidden">
    <h3 id="company-name"></h3>
    <p id="company-description"></p>
    <button onclick="hideExperience()">Close</button>
  </div>
</section>

<!-- CSS Styling -->
<style>
  /* Experience Section */
  .experience-grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .experience-item img {
    width: 150px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .experience-item img:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }

  #experience-details {
    margin-top: 40px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    text-align: center;
    border-radius: 10px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.7);
  }

  #experience-details h3 {
    margin-top: 0;
    color: #00bfff;
  }

  #experience-details.hidden {
    display: none;
  }

  #experience-details button {
    background: #00bfff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
  }

  #experience-details button:hover {
    background: #007bff;
  }
</style>

<!-- JavaScript for Interactivity -->
<script>
  const experiences = {
    adidas: {
      name: "adidas",
      description: "As a Marketing Analytics Specialist at Adidas, I optimized global marketing campaigns by leveraging data-driven insights, improving ROI across multiple regions.",
    },
    jde: {
      name: "Jacobs Douwe Egberts",
      description: "At JDE, I analyzed consumer behavior trends and developed predictive models to enhance coffee sales across multiple European markets.",
    },
    activision: {
      name: "Activision Blizzard",
      description: "During my time at Activision Blizzard, I led data analysis projects to optimize user engagement for AAA gaming titles, focusing on player retention.",
    },
    alternatifbank: {
      name: "Alternatif Bank",
      description: "As a Data Analyst at Alternatif Bank, I worked on financial modeling and provided insights to improve lending strategies and client acquisition.",
    },
  };

  function showExperience(companyKey) {
    const company = experiences[companyKey];
    document.getElementById("company-name").innerText = company.name;
    document.getElementById("company-description").innerText = company.description;
    document.getElementById("experience-details").classList.remove("hidden");
  }

  function hideExperience() {
    document.getElementById("experience-details").classList.add("hidden");
  }
</script>
